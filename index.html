<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Досьє Бункера</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>ІДЕНТИФІКАЦІЯ УЧАСНИКА</h2>
            <div class="input-group">
                <label>Ім'я (обов'язково)</label>
                <input type="text" id="firstNameInput" placeholder="Введіть ім'я" onkeydown="if(event.key === 'Enter') startGame()">
            </div>
            <div class="input-group">
                <label>Прізвище (за бажанням)</label>
                <input type="text" id="lastNameInput" placeholder="Введіть прізвище" onkeydown="if(event.key === 'Enter') startGame()">
            </div>
            <div class="toggle-row">
                    <span class="toggle-label">Приховати ролі</span>
                 <label class="switch">
                  <input type="checkbox" id="disableRole" checked>
                    <span class="slider round"></span>
                  </label>
            </div>
            
            <button class="generate-btn" onclick="startGame()">РОЗПОЧАТИ СИМУЛЯЦІЮ</button>
        </div>
    </div>
    <div class="app-wrapper">
        <div class="sheet-container">
            <div class="header-container">
                <div class="photo-box" id="profile-photo"></div>
                <div class="header-text">
                    <h1>ОСОБОВА СПРАВА</h1>
                    <p class="sub-header">ОБ'ЄКТ № <span id="candidate-id">0000</span></p>
                    <p class="sub-header" id="candidate-name" style="display:none; margin-top: 5px;"></p>
                </div>
            </div>
            <div id="character-sheet" class="hidden" style="position: relative;">
                <div id="global-lock" class="global-lock">
                    <button class="start-round-btn" onclick="unlockSheet()">РОЗПОЧАТИ</button>
                </div>
                <div class="box full-width" id="role-box">
                    <div class="label-row">
                        <span class="label">РОЛЬ (ХТО ТИ):</span>
                        <div class="action-btns">
                            <button class="add-btn" onclick="resetField('role', 'roles')" title="Перегенерувати">[↻]</button>
                        </div>
                    </div>
                    <div class="field-content" id="role"></div>
                </div>
                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ВІК ТА СТАТЬ (Статура):</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('bio', 'bio')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="bio"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ПРОФЕСІЯ:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('profession', 'professions')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="profession"></div>
                    </div>
                </div>
                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ЗДОРОВ'Я:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('health', 'health')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="health"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ФОБІЯ:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('phobia', 'phobias')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="phobia"></div>
                    </div>
                </div>
                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">РИСА ХАРАКТЕРУ:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('trait', 'traits')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="trait"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ХОБІ:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('hobby', 'hobbies')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="hobby"></div>
                    </div>
                </div>
                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">РЮКЗАК:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('inventory', 'inventory')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="inventory"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ДОД. ІНФОРМАЦІЯ:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('info', 'additional_info')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="info"></div>
                    </div>
                </div>
                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">СТОП БУНКЕР 1:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('special1', 'specials')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="special1"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">СТОП БУНКЕР 2:</span>
                            <div class="action-btns">
                                <button class="add-btn" onclick="resetField('special2', 'specials')" title="Перегенерувати">[↻]</button>
                            </div>
                        </div>
                        <div class="field-content" id="special2"></div>
                    </div>
                </div>
                <div class="footer-stamp">
                    <p>СТАТУС: ОЧІКУЄ РІШЕННЯ</p>
                </div>
            </div>
        </div>
        <button id="generateBtn" class="generate-btn" style="display:none;" onclick="generateCharacter()">ЗГЕНЕРУВАТИ НОВЕ ДОСЬЄ</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
