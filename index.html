<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Досьє Бункера</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Стартове вікно для введення імені -->
    <div id="start-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>ІДЕНТИФІКАЦІЯ УЧАСНИКА</h2>
            <div class="input-group">
                <label>Ім'я (обов'язково)</label>
                <input type="text" id="firstNameInput" placeholder="Введіть ім'я">
            </div>
            <div class="input-group">
                <label>Прізвище (за бажанням)</label>
                <input type="text" id="lastNameInput" placeholder="Введіть прізвище">
            </div>
            <button class="generate-btn" onclick="startGame()">РОЗПОЧАТИ СИМУЛЯЦІЮ</button>
        </div>
    </div>

    <div class="app-wrapper">
        <div class="sheet-container">
            <div class="header-container">
                <div class="photo-box" id="profile-photo">
                    <!-- Сюди скрипт вставить SVG силует -->
                </div>
                <div class="header-text">
                    <h1>ОСОБОВА СПРАВА</h1>
                    <p class="sub-header">ОБ'ЄКТ № <span id="candidate-id">0000</span></p>
                    <p class="sub-header" id="candidate-name" style="display:none; margin-top: 5px;"></p>
                </div>
            </div>

           <!-- ... верхня частина без змін ... -->

            <div id="character-sheet" class="hidden" style="position: relative;">
                
                <!-- ГЛОБАЛЬНИЙ БЛОКУВАЛЬНИК -->
                <div id="global-lock" class="global-lock">
                    <button class="start-round-btn" onclick="unlockSheet()">РОЗПОЧАТИ</button>
                </div>

                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ПРОФЕСІЯ:</span>
                            <button class="add-btn" onclick="addExtra('profession', 'professions')">[+]</button>
                        </div>
                        <div class="field-content" id="profession" onclick="revealField('profession', event)"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">БІОМЕТРІЯ:</span>
                        </div>
                        <div class="field-content" id="bio" onclick="revealField('bio', event)"></div>
                    </div>
                </div>

                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">СТАЖ РОБОТИ:</span>
                        </div>
                        <div class="field-content" id="experience" onclick="revealField('experience', event)"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ЗДОРОВ'Я:</span>
                            <button class="add-btn" onclick="addExtra('health', 'health')">[+]</button>
                        </div>
                        <div class="field-content" id="health" onclick="revealField('health', event)"></div>
                    </div>
                </div>

                <div class="box full-width">
                    <div class="label-row">
                        <span class="label">ДОДАТКОВІ НАВИЧКИ / ХОБІ:</span>
                        <button class="add-btn" onclick="addExtra('hobby', 'hobbies')">[+]</button>
                    </div>
                    <div class="field-content" id="hobby" onclick="revealField('hobby', event)"></div>
                </div>

                <div class="grid-section">
                    <div class="box">
                        <div class="label-row">
                            <span class="label">БАГАЖ (ІНВЕНТАР):</span>
                            <button class="add-btn" onclick="addExtra('inventory', 'inventory')">[+]</button>
                        </div>
                        <div class="field-content" id="inventory" onclick="revealField('inventory', event)"></div>
                    </div>
                    <div class="box">
                        <div class="label-row">
                            <span class="label">ФОБІЯ / РИСА:</span>
                            <button class="add-btn" onclick="addExtra('trait', 'traits')">[+]</button>
                        </div>
                        <div class="field-content" id="trait" onclick="revealField('trait', event)"></div>
                    </div>
                </div>

                <div class="box full-width">
                    <div class="label-row">
                        <span class="label">ОСОБЛИВА КАРТА (ДІЯ):</span>
                        <button class="add-btn" onclick="addExtra('special', 'specials')">[+]</button>
                    </div>
                    <div class="field-content" id="special" onclick="revealField('special', event)"></div>
                </div>

                <div class="footer-stamp">
                    <p>СТАТУС: ОЧІКУЄ РІШЕННЯ</p>
                </div>
            </div> <!-- Закриває character-sheet -->
        </div> <!-- Закриває sheet-container (тут закінчується паперовий фон) -->
        
        <!-- Кнопка має бути ТУТ -->
        <button id="generateBtn" class="generate-btn" style="display:none;" onclick="generateCharacter()">ЗГЕНЕРУВАТИ НОВЕ ДОСЬЄ</button>

    </div> <!-- Закриває app-wrapper -->

    <script src="script.js"></script>
</body>
</html>
